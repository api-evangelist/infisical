name: Infisical Plans and Pricing
description: Pricing tiers for Infisical cloud-hosted secrets management platform. Self-hosted open-source deployments are available at no cost under the MIT license.
version: "0.1"
url: https://infisical.com/pricing
plans:
  - name: Free
    description: >
      No-cost plan for individuals and small teams getting started with
      secrets management. Includes core platform features with limits on
      identities, projects, environments, and integrations.
    price: 0
    unit: month
    currency: USD
    features:
      - Up to 5 machine identities
      - Up to 3 projects
      - Up to 3 environments per project
      - Up to 10 integrations
      - Dashboard UI, API, CLI, SDKs
      - Kubernetes Operator and Infisical Agent
      - Webhooks
      - Two-factor authentication (2FA)
      - Secret referencing and overrides
      - Secret scanning
      - Secret sharing
      - All native integrations (AWS, GitHub, GitLab, etc.)
      - Community Slack support
      - Self-hosting or cloud options

  - name: Pro
    description: >
      Per-identity paid plan for growing teams requiring advanced access
      controls, secret rotation, SAML SSO, audit logs, and higher API
      rate limits.
    price: 18
    unit: identity/month
    currency: USD
    features:
      - All Free plan features
      - Unlimited projects
      - Up to 12 environments per project
      - Up to 50 integrations
      - Secret versioning
      - Point-in-time recovery
      - Role-based access controls (RBAC)
      - Secret rotation
      - Temporary access provisioning
      - SAML SSO
      - IP allowlisting
      - 90-day audit log retention
      - Higher API rate limits
      - Priority customer support

  - name: Enterprise
    description: >
      Custom-priced plan for large organizations requiring dedicated
      infrastructure, advanced identity federation, dynamic secrets,
      custom rate limits, and compliance tooling including SOC2 and
      PenTest reports.
    price: custom
    unit: custom
    currency: USD
    features:
      - All Pro plan features
      - Dedicated infrastructure
      - Enterprise SCIM provisioning
      - LDAP authentication
      - Dynamic secrets
      - AI security advisor
      - Approval workflows and access requests
      - Gateways
      - Sub-organizations
      - KMIP support
      - KMS and HSM support
      - Audit log streaming
      - Custom audit log retention
      - Custom API rate limits
      - User groups and custom roles
      - 99.99% SLA
      - SOC2 and PenTest reports
      - Dedicated support engineer

  - name: Self-Hosted (Open Source)
    description: >
      MIT-licensed self-hosted deployment with no licensing cost. Full
      feature access with no API rate limits. Suitable for organizations
      requiring data residency or full infrastructure control.
    price: 0
    unit: none
    currency: USD
    features:
      - Full platform features
      - No API rate limits
      - No licensing fee
      - Self-managed infrastructure
      - All integrations
      - Community support via GitHub
